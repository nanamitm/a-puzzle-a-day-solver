name: Qt Client Release

on:
  workflow_dispatch:
  push:
    tags:
      - "qt-client-v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          cache: true

      - name: Build Rust FFI
        run: cargo build -p solver-ffi --release

      - name: Configure Qt client
        run: cmake -B qt-client/build -S qt-client -DCMAKE_BUILD_TYPE=Release

      - name: Build Qt client
        run: cmake --build qt-client/build --config Release --parallel

      - name: Deploy Qt runtime
        run: windeployqt qt-client/build/Release/APuzzleADaySolverGUI.exe

      - name: Package release
        shell: pwsh
        run: |
          $dist = "dist/APuzzleADaySolverGUI-windows-x64"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item qt-client/build/Release/* -Destination $dist -Recurse -Force
          Copy-Item qt-client/readme.txt -Destination $dist -Force
          Compress-Archive -Path "$dist/*" -DestinationPath "dist/APuzzleADaySolverGUI-windows-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: APuzzleADaySolverGUI-windows-x64
          path: dist/APuzzleADaySolverGUI-windows-x64.zip

      - name: Upload GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/APuzzleADaySolverGUI-windows-x64.zip

  build-linux:
    name: Build Linux release (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Qt build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            qt6-base-dev \
            qt6-tools-dev \
            libgl1-mesa-dev

      - name: Build Rust FFI
        run: cargo build -p solver-ffi --release

      - name: Configure Qt client
        run: cmake -B qt-client/build -S qt-client -DCMAKE_BUILD_TYPE=Release

      - name: Build Qt client
        run: cmake --build qt-client/build --parallel

      - name: Package release
        run: |
          dist="dist/APuzzleADaySolverGUI-linux-${{ matrix.arch }}"
          mkdir -p "$dist"
          cp qt-client/build/APuzzleADaySolverGUI "$dist/"
          cp qt-client/build/libsolver_ffi.so "$dist/"
          cp qt-client/readme.txt "$dist/"
          tar -C dist -czf "dist/APuzzleADaySolverGUI-linux-${{ matrix.arch }}.tar.gz" "APuzzleADaySolverGUI-linux-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: APuzzleADaySolverGUI-linux-${{ matrix.arch }}
          path: dist/APuzzleADaySolverGUI-linux-${{ matrix.arch }}.tar.gz

      - name: Upload GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/APuzzleADaySolverGUI-linux-${{ matrix.arch }}.tar.gz
